<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>آلتي الحاسبة المطورة</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #17171c;
            margin: 0;
            font-family: sans-serif;
        }

        .calculator {
            background-color: #22252d;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 340px;
        }

        #display {
            width: 100%;
            height: 80px;
            background-color: transparent;
            border: none;
            color: #ffffff;
            text-align: right;
            font-size: 2.5rem;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 20px;
            font-size: 1.5rem;
            border: none;
            border-radius: 16px;
            background-color: #2d3137;
            color: #ffffff;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        button:first-child {
            color: #f39c12;
        }

        .plus {
            grid-row: span 2;
            background-color: #007aff;
        }

        .equal {
            grid-row: span 2;
            background-color: #2ecc71;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="buttons">
            <button>C</button>
            <button>÷</button>
            <button>×</button>
            <button>-</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="plus">+</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="equal">=</button>
            
            <button class="zero">0</button>
            <button>.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('button');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const value = button.innerText;

                if (value === 'C') {
                    display.value = '';
                } else if (value === '=') {
                    try {
                        if (display.value !== '') {
                            // خطوة الترجمة السحرية:
                            // نأخذ النص من الشاشة ونستبدل الرموز العادية برمز البرمجة قبل الحساب
                            let expression = display.value;
                            expression = expression.replace(/×/g, '*').replace(/÷/g, '/');
                            
                            display.value = eval(expression);
                        }
                    } catch (error) {
                        display.value = 'خطأ';
                    }
                } else {
                    if (display.value === 'خطأ') {
                        display.value = '';
                    }
                    display.value += value;
                }
            });
        });
    </script>

</body>
</html>
