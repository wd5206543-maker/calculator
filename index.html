plus {
            grid-row: span 2;
            background-color: #007aff;
        }

        .equal {
            grid-row: span 2;
            background-color: #2ecc71;
        }

        .zero {
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        
        <div class="buttons">
            <button>C</button>
            <button>÷</button>
            <button>×</button>
            <button>-</button>
            
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="plus">+</button>
            
            <button>4</button>
            <button>5</button>
            <button>6</button>
            
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="equal">=</button>
            
            <button class="zero">0</button>
            <button>.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('button');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const value = button.innerText;

                if (value === 'C') {
                    display.value = '';
                } else if (value === '=') {
                    try {
                        if (display.value !== '') {
                            // خطوة الترجمة السحرية:
                            // نأخذ النص من الشاشة ونستبدل الرموز العادية برمز البرمجة قبل الحساب
                            let expression = display.value;
                            expression = expression.replace(/×/g, '*').replace(/÷/g, '/');
                            
                            display.value = eval(expression);
                        }
                    } catch (error) {
                        display.value = 'خطأ';
                    }
                } else {
                    if (display.value === 'خطأ') {
                        display.value = '';
                    }
                    display.value += value;
                }
            });
        });
    </script>
